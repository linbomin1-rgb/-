<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美业门店管理系统 - 极速版</title>
    <!-- 第三方库 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-active { color: #4f46e5; transform: scale(1.1); }
        .tab-inactive { color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen overflow-x-hidden">

    <!-- 登录界面 -->
    <div id="login-screen" class="fixed inset-0 z-[500] bg-white flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-8 animate-in fade-in zoom-in duration-500">
            <div class="text-center space-y-2">
                <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white mx-auto shadow-2xl shadow-indigo-200 rotate-3 hover:rotate-0 transition-transform duration-500">
                    <i data-lucide="sparkles" class="w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-900 uppercase pt-4">美业门店管理系统</h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">SALON MANAGEMENT OS v2.0</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4">职员姓名</label>
                    <input type="text" id="login-username" placeholder="输入姓名" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-indigo-400 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4">安全密码</label>
                    <input type="password" id="login-password" placeholder="••••••" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-indigo-400 transition-all">
                </div>
                <button id="login-btn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-black active:scale-95 transition-all">进入系统</button>
            </div>
            <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-tighter">© 2026 SALON OS • SINGLE FILE EDITION</p>
        </div>
    </div>

    <!-- 主应用界面 (默认隐藏) -->
    <div id="app-screen" class="hidden flex flex-col h-screen overflow-hidden">
        <!-- 顶部导航 -->
        <header class="h-16 md:h-20 glass-effect border-b flex items-center justify-between px-4 md:px-8 shrink-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                    <i data-lucide="scissors" class="w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="text-sm md:text-base font-black text-slate-900 tracking-tight uppercase">门店工作台</h2>
                    <p id="current-user-display" class="text-[9px] md:text-[10px] font-bold text-indigo-500 uppercase tracking-widest italic">加载中...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button id="logout-btn" class="p-2 md:p-3 text-slate-400 hover:text-red-500 transition-all"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto custom-scroll p-4 md:p-8 pb-24 md:pb-8">
            <div id="content-area" class="max-w-7xl mx-auto space-y-6 md:space-y-8">
                <!-- 动态内容将通过 JS 注入此处 -->
            </div>
        </main>

        <!-- 底部导航 (移动端) -->
        <nav class="md:hidden h-16 bg-white border-t flex items-center justify-around px-1 shrink-0 z-[140] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] safe-bottom">
            <button onclick="switchTab('dashboard')" class="nav-item flex flex-col items-center gap-1 transition-all w-14 tab-active" data-tab="dashboard">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">概览</span>
            </button>
            <button onclick="switchTab('appointments')" class="nav-item flex flex-col items-center gap-1 transition-all w-14 tab-inactive" data-tab="appointments">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">预约</span>
            </button>
            <button onclick="switchTab('customers')" class="nav-item flex flex-col items-center gap-1 transition-all w-14 tab-inactive" data-tab="customers">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">会员</span>
            </button>
            <button onclick="switchTab('finance')" class="nav-item flex flex-col items-center gap-1 transition-all w-14 tab-inactive" data-tab="finance">
                <i data-lucide="banknote" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">财务</span>
            </button>
            <button onclick="switchTab('settings')" class="nav-item flex flex-col items-center gap-1 transition-all w-14 tab-inactive" data-tab="settings">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">设置</span>
            </button>
        </nav>

        <!-- 侧边导航 (桌面端) -->
        <aside class="hidden md:flex fixed left-0 top-20 bottom-0 w-20 bg-white border-r flex-col items-center py-8 gap-8 z-40">
            <button onclick="switchTab('dashboard')" class="nav-item p-3 rounded-2xl transition-all tab-active" data-tab="dashboard" title="概览"><i data-lucide="layout-dashboard" class="w-6 h-6"></i></button>
            <button onclick="switchTab('appointments')" class="nav-item p-3 rounded-2xl transition-all tab-inactive" data-tab="appointments" title="预约"><i data-lucide="calendar" class="w-6 h-6"></i></button>
            <button onclick="switchTab('customers')" class="nav-item p-3 rounded-2xl transition-all tab-inactive" data-tab="customers" title="会员"><i data-lucide="users" class="w-6 h-6"></i></button>
            <button onclick="switchTab('finance')" class="nav-item p-3 rounded-2xl transition-all tab-inactive" data-tab="finance" title="财务"><i data-lucide="banknote" class="w-6 h-6"></i></button>
            <button onclick="switchTab('settings')" class="nav-item p-3 rounded-2xl transition-all tab-inactive" data-tab="settings" title="设置"><i data-lucide="settings" class="w-6 h-6"></i></button>
        </aside>
    </div>

    <!-- 弹窗容器 -->
    <div id="modal-container" class="hidden fixed inset-0 z-[200] flex items-end md:items-center justify-center p-0 md:p-4 animate-in fade-in duration-200">
        <div class="absolute inset-0 bg-slate-950/70 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content" class="relative z-10 bg-white w-full max-w-lg rounded-t-[2rem] md:rounded-[3rem] p-5 md:p-10 shadow-2xl overflow-y-auto max-h-[90vh] custom-scroll animate-in slide-in-from-bottom-10 md:zoom-in-95 text-slate-900">
            <!-- 弹窗内容动态注入 -->
        </div>
    </div>

    <!-- 核心业务逻辑 -->
    <script>
        /**
         * 美业门店管理系统 - 极速版 (Vanilla JS)
         * 核心逻辑与 UI 渲染
         */

        // --- 1. 状态管理 ---
        let state = {
            currentUser: null,
            activeTab: 'dashboard',
            customers: [],
            appointments: [],
            transactions: [],
            staff: [],
            reminders: [],
            promotions: [],
            logs: [],
            isModalOpen: false,
            selectedDate: new Date()
        };

        // --- 2. 初始化 ---
        let supabaseClient = null;

        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            lucide.createIcons();
        });

        function initApp() {
            const savedUser = localStorage.getItem('salon_user');
            if (savedUser) {
                state.currentUser = JSON.parse(savedUser);
                showApp();
            } else {
                showLogin();
            }

            document.getElementById('login-btn').addEventListener('click', handleLogin);
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
        }

        // --- 3. 登录逻辑 ---
        function handleLogin() {
            const username = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;

            if (!username || !pass) {
                alert('请输入姓名和密码');
                return;
            }

            state.currentUser = { name: username, role: '管理员' };
            localStorage.setItem('salon_user', JSON.stringify(state.currentUser));
            showApp();
        }

        function handleLogout() {
            state.currentUser = null;
            localStorage.removeItem('salon_user');
            showLogin();
        }

        function showLogin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('current-user-display').textContent = `${state.currentUser.name} • ${state.currentUser.role}`;
            
            loadData();
            render();
        }

        // --- 4. 数据加载 ---
        function loadData() {
            const keys = ['customers', 'appointments', 'transactions', 'staff', 'promotions', 'logs'];
            keys.forEach(key => {
                const data = localStorage.getItem(`salon_${key}`);
                state[key] = data ? JSON.parse(data) : [];
            });

            if (state.staff.length === 0) {
                state.staff = [
                    { id: '1', name: '店长小美', role: '店长', avatar: '👩‍💼' },
                    { id: '2', name: '阿强', role: '高级技师', avatar: '💇‍♂️' }
                ];
                saveData('staff');
            }
        }

        function saveData(key) {
            localStorage.setItem(`salon_${key}`, JSON.stringify(state[key]));
        }

        // --- 5. 路由/标签页切换 ---
        function switchTab(tabId) {
            state.activeTab = tabId;
            
            document.querySelectorAll('.nav-item').forEach(el => {
                if (el.dataset.tab === tabId) {
                    el.classList.add('tab-active');
                    el.classList.remove('tab-inactive');
                } else {
                    el.classList.remove('tab-active');
                    el.classList.add('tab-inactive');
                }
            });

            render();
        }

        // --- 6. UI 渲染引擎 ---
        function render() {
            const container = document.getElementById('content-area');
            container.innerHTML = ''; 

            switch (state.activeTab) {
                case 'dashboard': renderDashboard(container); break;
                case 'appointments': renderAppointments(container); break;
                case 'customers': renderCustomers(container); break;
                case 'finance': renderFinance(container); break;
                case 'settings': renderSettings(container); break;
            }
            
            lucide.createIcons();
        }

        // --- 7. 各模块渲染函数 ---

        function renderDashboard(container) {
            const todayIncome = state.transactions
                .filter(t => t.date.startsWith(new Date().toISOString().split('T')[0]))
                .reduce((sum, t) => sum + t.amount, 0);

            container.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">今日营收</p>
                        <h3 class="text-2xl font-black text-slate-900">¥${todayIncome}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">待办预约</p>
                        <h3 class="text-2xl font-black text-indigo-600">${state.appointments.filter(a => a.status === 'pending').length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">新增会员</p>
                        <h3 class="text-2xl font-black text-slate-900">${state.customers.length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">活跃提醒</p>
                        <h3 class="text-2xl font-black text-amber-500">0</h3>
                    </div>
                </div>
                
                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">智能经营提醒</h3>
                        <button onclick="alert('正在扫描...')" class="text-[10px] font-black text-indigo-600 uppercase underline">刷新扫描</button>
                    </div>
                    <div id="reminder-list" class="space-y-4">
                        <p class="text-center py-8 text-slate-300 font-bold italic">暂无待办提醒</p>
                    </div>
                </div>
            `;
        }

        function renderAppointments(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">预约中心</h2>
                    <button onclick="openApptModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">新增预约</button>
                </div>
                <div class="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                    <div class="p-6 border-b bg-slate-50 flex items-center justify-between">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest">今日排班表</span>
                        <input type="date" value="${state.selectedDate.toISOString().split('T')[0]}" class="bg-transparent font-bold text-sm outline-none">
                    </div>
                    <div class="p-8">
                        ${state.appointments.length > 0 ? state.appointments.map(a => `
                            <div class="flex items-center justify-between p-4 border-b last:border-0">
                                <div>
                                    <p class="font-black text-slate-900">${a.customerName}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">${a.projectName} • ${a.startHour}</p>
                                </div>
                                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase">${a.status}</span>
                            </div>
                        `).join('') : '<p class="text-center text-slate-300 font-bold italic">今日暂无预约</p>'}
                    </div>
                </div>
            `;
        }

        function renderCustomers(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">会员档案</h2>
                    <button onclick="openCustomerModal()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">录入会员</button>
                </div>
                <div class="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">姓名</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">手机</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">余额</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="customer-table-body">
                            ${state.customers.length > 0 ? state.customers.map(c => `
                                <tr class="border-b hover:bg-slate-50 transition-colors">
                                    <td class="px-8 py-4 font-bold text-slate-900">${c.name}</td>
                                    <td class="px-8 py-4 text-slate-500 font-medium">${c.phone}</td>
                                    <td class="px-8 py-4 font-black text-indigo-600">¥${c.balance}</td>
                                    <td class="px-8 py-4 text-right">
                                        <button onclick="openRechargeModal('${c.id}')" class="text-[10px] font-black text-indigo-600 uppercase mr-4">充值</button>
                                        <button onclick="alert('消费功能开发中')" class="text-[10px] font-black text-slate-900 uppercase">消费</button>
                                    </td>
                                </tr>
                            `).join('') : '<tr><td colspan="4" class="px-8 py-12 text-center text-slate-300 font-bold italic">暂无会员数据</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderFinance(container) {
            container.innerHTML = `
                <h2 class="text-2xl font-black text-slate-800 tracking-tight mb-6">财务流水</h2>
                <div class="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">日期</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">客户</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">类型</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase text-right">金额</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${state.transactions.length > 0 ? state.transactions.map(t => `
                                <tr class="border-b">
                                    <td class="px-8 py-4 text-xs font-bold text-slate-400">${t.date.split('T')[0]}</td>
                                    <td class="px-8 py-4 font-bold text-slate-900">${t.custName}</td>
                                    <td class="px-8 py-4"><span class="px-2 py-1 bg-slate-100 rounded text-[9px] font-black uppercase">${t.type}</span></td>
                                    <td class="px-8 py-4 text-right font-black text-slate-900">¥${t.amount}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="4" class="px-8 py-12 text-center text-slate-300 font-bold italic">暂无流水记录</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderSettings(container) {
            container.innerHTML = `
                <h2 class="text-2xl font-black text-slate-800 tracking-tight mb-6">系统设置</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-4">
                        <h3 class="font-black text-slate-800 uppercase tracking-widest text-sm">数据同步</h3>
                        <button onclick="syncToCloud()" class="w-full py-4 bg-indigo-50 text-indigo-600 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-100 transition-all">同步到 Supabase 云端</button>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-4">
                        <h3 class="font-black text-red-600 uppercase tracking-widest text-sm">危险区域</h3>
                        <button onclick="resetSystem()" class="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-100 transition-all">重置所有本地数据</button>
                    </div>
                </div>
            `;
        }

        // --- 8. 弹窗控制 ---
        function openModal(contentHtml) {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = contentHtml;
            modal.classList.remove('hidden');
            state.isModalOpen = true;
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container');
            modal.classList.add('hidden');
            state.isModalOpen = false;
        }

        // --- 9. 业务操作 ---
        function openCustomerModal() {
            openModal(`
                <div class="space-y-6">
                    <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tight">录入新会员</h3>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">姓名 *</label>
                            <input type="text" id="cust-name" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-400">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">手机号 *</label>
                            <input type="tel" id="cust-phone" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-400">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">初始余额</label>
                            <input type="number" id="cust-balance" value="0" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-400">
                        </div>
                        <button onclick="saveCustomer()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">确认保存</button>
                    </div>
                </div>
            `);
        }

        function saveCustomer() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const balance = parseFloat(document.getElementById('cust-balance').value) || 0;
            if (!name || !phone) { alert('请填写姓名和手机号'); return; }
            const newCust = { id: Date.now().toString(), name, phone, balance, createdAt: new Date().toISOString() };
            state.customers.push(newCust);
            saveData('customers');
            closeModal();
            render();
        }

        function openRechargeModal(custId) {
            const cust = state.customers.find(c => c.id === custId);
            openModal(`
                <div class="space-y-6">
                    <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tight">会员充值</h3>
                    <p class="text-sm font-bold text-slate-400 uppercase">会员：${cust.name}</p>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">充值金额 *</label>
                            <input type="number" id="recharge-amount" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-xl outline-none border-2 border-transparent focus:border-indigo-400">
                        </div>
                        <button onclick="handleRecharge('${custId}')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">确认充值</button>
                    </div>
                </div>
            `);
        }

        function handleRecharge(custId) {
            const amount = parseFloat(document.getElementById('recharge-amount').value);
            if (!amount || amount <= 0) return;
            const custIndex = state.customers.findIndex(c => c.id === custId);
            state.customers[custIndex].balance += amount;
            state.transactions.push({ id: Date.now().toString(), custId, custName: state.customers[custIndex].name, type: 'recharge', amount, method: 'cash', date: new Date().toISOString() });
            saveData('customers');
            saveData('transactions');
            closeModal();
            render();
        }

        function resetSystem() {
            if (confirm('确定要清空所有本地数据吗？')) { localStorage.clear(); location.reload(); }
        }

        function syncToCloud() {
            alert('正在连接 Supabase... 请在代码中配置您的 URL 和 Key');
        }

        // 暴露给全局
        window.switchTab = switchTab;
        window.closeModal = closeModal;
        window.resetSystem = resetSystem;
        window.syncToCloud = syncToCloud;
        window.openCustomerModal = openCustomerModal;
        window.saveCustomer = saveCustomer;
        window.openRechargeModal = openRechargeModal;
        window.handleRecharge = handleRecharge;
    </script>
</body>
</html>
